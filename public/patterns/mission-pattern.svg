<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <defs>
    <pattern id="mission-pattern" x="0" y="0" width="280" height="280" patternUnits="userSpaceOnUse">
      <!-- Spiral galaxy (face-on) -->
      <g fill="none" stroke="#a1a1aa" stroke-width="0.35" opacity="0.11">
        <path d="M0 0 Q8 0 4 8 Q0 12 -4 8 Q-8 0 0 0" transform="translate(40, 35) scale(1.2)"/>
        <path d="M0 0 Q10 2 6 12 Q2 16 -6 10 Q-10 2 0 0" transform="translate(180, 95) scale(0.9) rotate(30)"/>
      </g>
      <!-- Moon (circle outline) -->
      <g fill="none" stroke="#d4d4d8" stroke-width="0.45" opacity="0.1">
        <circle cx="0" cy="0" r="7" transform="translate(120, 25)"/>
        <circle cx="0" cy="0" r="5" transform="translate(230, 170)"/>
      </g>
      <!-- Nebula / cloud-like shape -->
      <g fill="none" stroke="#71717a" stroke-width="0.3" opacity="0.09">
        <ellipse cx="0" cy="0" rx="18" ry="8" transform="translate(70, 120) rotate(-15)"/>
        <ellipse cx="0" cy="0" rx="12" ry="6" transform="translate(75, 118) rotate(-15)"/>
        <ellipse cx="0" cy="0" rx="14" ry="5" transform="translate(200, 55) rotate(20)"/>
      </g>
      <!-- Constellation lines (Orion belt style) -->
      <g fill="none" stroke="#94a3b8" stroke-width="0.4" opacity="0.1">
        <line x1="0" y1="0" x2="12" y2="4" transform="translate(25, 80)"/>
        <line x1="12" y1="4" x2="20" y2="0" transform="translate(25, 80)"/>
        <line x1="20" y1="0" x2="28" y2="6" transform="translate(25, 80)"/>
        <line x1="0" y1="8" x2="14" y2="4" transform="translate(140, 190)"/>
        <line x1="14" y1="4" x2="24" y2="10" transform="translate(140, 190)"/>
      </g>
      <!-- Celestial coordinate grid (RA/Dec style arcs) -->
      <g fill="none" stroke="#52525b" stroke-width="0.25" opacity="0.07">
        <path d="M 0 0 A 50 50 0 0 1 50 0" transform="translate(100, 140)"/>
        <path d="M 0 0 A 45 45 0 0 0 -45 0" transform="translate(165, 155)"/>
      </g>
      <!-- Planetary orbit -->
      <ellipse fill="none" stroke="#a1a1aa" stroke-width="0.35" opacity="0.1" cx="0" cy="0" rx="22" ry="10" transform="translate(150, 75) rotate(-25)"/>
      <ellipse fill="none" stroke="#71717a" stroke-width="0.3" opacity="0.08" cx="0" cy="0" rx="16" ry="7" transform="translate(55, 195) rotate(40)"/>
      <!-- Star with varying magnitude (dots) -->
      <g fill="#e4e4e7" opacity="0.12">
        <circle cx="0" cy="0" r="1.2" transform="translate(90, 60)"/>
        <circle cx="0" cy="0" r="0.7" transform="translate(95, 55)"/>
        <circle cx="0" cy="0" r="0.5" transform="translate(88, 58)"/>
      </g>
      <g fill="#e4e4e7" opacity="0.1">
        <circle cx="0" cy="0" r="1" transform="translate(200, 130)"/>
        <circle cx="0" cy="0" r="0.6" transform="translate(205, 125)"/>
      </g>
      <g fill="#e4e4e7" opacity="0.09">
        <circle cx="0" cy="0" r="0.8" transform="translate(35, 150)"/>
        <circle cx="0" cy="0" r="0.5" transform="translate(220, 220)"/>
      </g>
      <!-- Comet tail -->
      <path fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.08" d="M0 0 L -20 4 L -35 2" transform="translate(250, 45)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#mission-pattern)"/>
</svg>
